# .github/workflows/deploy-backend.yml
name: Deploy Backend

on:
  push:
    branches: [staging, main]

env:
  AWS_REGION: us-east-2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip auto-merge commits that GitHub creates when syncing staging with main
    # (e.g. "Merge branch 'main' into staging" during a PR). These are not real
    # deployable changes — only deploy on actual feature/fix pushes.
    if: |
      !(github.ref == 'refs/heads/staging' &&
        startsWith(github.event.head_commit.message, 'Merge branch ''main'''))

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: dgx-${{ steps.env.outputs.environment }}-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG:0:7}
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA -f Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Download task definition
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          aws ecs describe-task-definition \
            --task-definition dgx-${ENVIRONMENT}-backend \
            --query taskDefinition > task-definition.json

      - name: Update task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: dgx-${{ steps.env.outputs.environment }}-backend
          cluster: dgx-${{ steps.env.outputs.environment }}-cluster
          wait-for-service-stability: true
          wait-for-minutes: 10
